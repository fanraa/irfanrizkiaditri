    <div id="root">
      <!-- Fallback UI saat loading atau error -->
      <div id="app-fallback" style="position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #0f172a; color: white; font-family: 'Inter', sans-serif; z-index: 9999; transition: opacity 0.5s ease;">
        <div style="position: relative; width: 80px; height: 80px; margin-bottom: 24px;">
          <div style="position: absolute; inset: 0; border: 4px solid rgba(59, 130, 246, 0.2); border-radius: 50%;"></div>
          <div style="position: absolute; inset: 0; border: 4px solid transparent; border-top-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite;"></div>
        </div>
        <div id="fallback-status" style="font-size: 1.1rem; font-weight: 500; letter-spacing: 0.025em;">Memuat Fanra Portfolio...</div>
        <div id="fallback-error" style="display: none; margin-top: 16px; text-align: center; max-width: 300px; padding: 0 20px;">
          <p style="color: #f87171; margin-bottom: 16px;">Gagal memuat aplikasi. Koneksi mungkin terganggu atau ada masalah pada cache.</p>
          <button onclick="window.location.reload()" style="background: #3b82f6; color: white; border: none; padding: 10px 24px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: background 0.2s;">
            Segarkan Halaman
          </button>
        </div>
      </div>
      <style>
        @keyframes spin { to { transform: rotate(360deg); } }
      </style>
    </div>

    <script>
      // Deteksi kegagalan load asset (JS/CSS)
      window.addEventListener('error', function(e) {
        if (e.target.tagName === 'SCRIPT' || e.target.tagName === 'LINK') {
          const status = document.getElementById('fallback-status');
          const error = document.getElementById('fallback-error');
          if (status) status.style.display = 'none';
          if (error) error.style.display = 'block';
        }
      }, true);

      // Timeout jika React tidak kunjung mount (10 detik)
      setTimeout(function() {
        const root = document.getElementById('root');
        const fallback = document.getElementById('app-fallback');
        // Jika konten root masih berisi fallback UI, berarti React belum mount
        if (fallback && document.body.contains(fallback)) {
          const status = document.getElementById('fallback-status');
          if (status && status.innerText.includes('Memuat')) {
            status.innerText = 'Masih mencoba memuat...';
            setTimeout(() => {
              if (fallback && document.body.contains(fallback)) {
                const error = document.getElementById('fallback-error');
                if (status) status.style.display = 'none';
                if (error) error.style.display = 'block';
              }
            }, 5000);
          }
        }
      }, 5000);

      // Fungsi untuk menyembunyikan fallback saat React siap
      // Ini akan dipanggil dari App.tsx atau main entry point
      window.hideAppFallback = function() {
        const fallback = document.getElementById('app-fallback');
        if (fallback) {
          fallback.style.opacity = '0';
          setTimeout(() => {
            if (fallback.parentNode) fallback.parentNode.removeChild(fallback);
          }, 500);
        }
      };
    </script>
